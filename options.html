<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; width: 350px; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { background-color: #00b2a9; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold;}
    button:hover { background-color: #008f88; }
    #status { margin-top: 10px; font-size: 12px; color: green; font-weight: bold; text-align: center;}
  </style>
</head>
<body>
  <h3>IKEA Autofill Settings</h3>
  
  <label for="email">Your Email Address:</label>
  <input type="email" id="email" placeholder="youremail@example.com">
  
  <label for="scriptUrl">Google Script URL:</label>
  <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
  
  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
